# TODO: Add a parity test step before rendering. Requires AWS credentials
# (AWS_PROFILE, AWS_REGION, ATHENA_S3_STAGING_DIR) configured as GitHub secrets
# and an SSO or IAM auth mechanism for Athena access.
#
# Publishes to the gh-pages branch (rather than the native GitHub Actions
# Pages deployment) so that pr-preview.yml can publish per-PR previews to
# subfolders of the same branch alongside this production deploy. See
# https://github.com/rossjrw/pr-preview-action for why the two need to share
# a branch-based Pages source.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      # https://github.com/peaceiris/actions-gh-pages
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _book
          # Preserve pr-preview/* subfolders written by pr-preview.yml; do not
          # use force_orphan here, since that would wipe every open PR preview
          # on each production deploy.
          keep_files: true
