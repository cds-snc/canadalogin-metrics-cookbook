---
project:
  type: website
  output-dir: _book
  # Website projects render every .qmd by default; the metric subfolders hold
  # include-only fragments, so exclude them (and the catalog template) here.
  render:
    - "*.qmd"
    - "cookbook/*.qmd"
    - "catalog/*.qmd"
    - "!cookbook/ibm_verify/"
    - "!cookbook/call_centre/"
    - "!catalog/ibm_verify/"
    - "!catalog/call_centre/"
    - "!catalog/data-catalog-template.qmd"

website:
  title: "CanadaLogin Metrics Cookbook"
  page-navigation: true
  sidebar:
    style: docked
    collapse-level: 2
    contents:
      - index.qmd
      - section: "Metrics Cookbook"
        href: cookbook/index.qmd
        contents:
          - cookbook/ibm_verify.qmd
          - cookbook/call_centre.qmd
          - cookbook/notes.qmd
#          - cookbook/cross-source.qmd
      - section: "Data Catalog"
        href: catalog/index.qmd
        contents:
          - catalog/ibm_verify.qmd
          - catalog/call_centre.qmd
          - catalog/notes.qmd

format:
  html:
    toc: true
    toc-depth: 4
    toc-location: right
    toc-expand: true
    code-fold: true
    number-sections: false
    theme:
      # Order sets precedence: custom.scss > _brand.yml > cosmo. The brand
      # supplies CDS colours and fonts on top of cosmo; custom.scss keeps the
      # structural overrides (TOC width, bold nav) on top of everything.
      - cosmo
      - brand
      - custom.scss

execute:
  echo: true
  warning: false
  message: false
